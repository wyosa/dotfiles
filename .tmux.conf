# Smart pane switching with awareness of Neovim splits.
bind-key -n C-h if -F "#{@pane-is-vim}" "send-keys C-h" "select-pane -L"
bind-key -n C-j if -F "#{@pane-is-vim}" "send-keys C-j" "select-pane -D"
bind-key -n C-k if -F "#{@pane-is-vim}" "send-keys C-k" "select-pane -U"
bind-key -n C-l if -F "#{@pane-is-vim}" "send-keys C-l" "select-pane -R"

# Smart pane resizing with awareness of Neovim splits.
bind-key -n M-h if -F "#{@pane-is-vim}" "send-keys M-h" "resize-pane -L 3"
bind-key -n M-j if -F "#{@pane-is-vim}" "send-keys M-j" "resize-pane -D 3"
bind-key -n M-k if -F "#{@pane-is-vim}" "send-keys M-k" "resize-pane -U 3"
bind-key -n M-l if -F "#{@pane-is-vim}" "send-keys M-l" "resize-pane -R 3"

# Smart "last-pane" toggle on C-\ .
# tmux 3.x needs extra escaping for backslash in send-keys.
if-shell -b 'tmux -V | grep -qE "^tmux 1|^tmux 2"' \
  'bind-key -n "C-\\" if -F "#{@pane-is-vim}" "send-keys C-\\" "select-pane -l"' \
  'bind-key -n "C-\\" if -F "#{@pane-is-vim}" "send-keys C-\\\\" "select-pane -l"'

# copy-mode navigation
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi "C-\\" select-pane -l

# reload config
unbind r
bind r source-file ~/.tmux.conf

# prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# act like vim (prefix + h/j/k/l)
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# plugins
set -g @plugin 'tmux-plugins/tpm'
# (optional) remove this if you use smart-splits only
set -g @plugin 'christoomey/vim-tmux-navigator'

# status bar (clean + light)
set -g status on
set -g status-left ""
set -g status-right ""
set -g status-left-length 0
set -g status-right-length 0

set -g status-style "bg=default,fg=#2c313a"
set -g window-status-style "bg=default,fg=#5c6370"
set -g window-status-current-style "bg=#e5e5e6,fg=#2c313a"
set -g window-status-activity-style "bg=#000000,fg=#ffffff"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator ""

setw -g monitor-activity on
set -g visual-activity off

# turn of tmux rename
set -g allow-rename off
setw -g automatic-rename off

# cladue code fix
set -g mouse on

# automatic window order
set -g renumber-windows on

# init TPM (must be very bottom)
run-shell "$HOME/.tmux/plugins/tpm/tpm"
